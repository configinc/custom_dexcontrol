# ── Joint initial positions (per arm-side) ────────────────────────────
init_joints:
  left:  [-1.4234,  1.3524,  2.8707, -1.981,   0.6751, -0.1662,  0.068]
  right: [ 1.4234, -1.3524, -2.8707, -1.981,  -0.1515,  0.1662, -0.068]

middle_joints:
  left:  [-0.9548,  0.9862, -0.3738, -1.4169,  0.6624, -0.2987, -0.0650]
  right: [ 0.9548, -0.9862,  0.3738, -1.4169, -0.6624,  0.2987,  0.0650]

# ── Head initial position [yaw, pitch, roll] ──────────────────────────
head_init_pos: [2.0, 0.0, -0.3]

# ── Teleop gains ────────────────────────────────────────────────────────
teleop:
  pos_action_gain: 5.0
  rot_action_gain: 2.0

# ── Motion filter ───────────────────────────────────────────────────────
motion_filter:
  ema_alpha: 0.0
  filter_type: "none"
  filter_cutoff_freq: 10.0
  filter_order: 2
  filter_ema_alpha: 0.1
  vel_smoothing_alpha: 0.3
  hw_correction_alpha: 0.7
  max_delta_scale: 1.0
  max_accel_delta: 0.25
  vel_ratio: 1.0
  vel_damp_thresh: 0.05

# ── IK damping ───────────────────────────────────────────────────────
ik_damping:
  default: 0.001
  override:
    torso_j1: 30000.0
    torso_j2: 30000.0
    torso_j3: 30000.0
    R_arm_j1: 50.0
    L_arm_j1: 50.0
    R_arm_j2: 75.0
    L_arm_j2: 75.0
    R_arm_j3: 50.0
    L_arm_j3: 50.0
    R_arm_j4: 50.0
    L_arm_j4: 50.0
    R_arm_j5: 120.0
    L_arm_j5: 120.0
    R_arm_j6: 120.0
    L_arm_j6: 120.0
    R_arm_j7: 120.0
    L_arm_j7: 120.0

# ── Motor max delta (per joint, rad/step) ─────────────────────────────
motor_max_delta_rad:
  - 0.35   # j1 – base rotation
  - 0.35   # j2 – shoulder
  - 0.35   # j3 – shoulder
  - 0.50   # j4 – elbow
  - 0.60   # j5 – wrist
  - 0.60   # j6 – wrist
  - 0.60   # j7 – wrist
